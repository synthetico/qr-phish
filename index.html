<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Access</title>

    <!-- Redirect after 3 seconds -->
    <meta http-equiv="refresh" content="3;url=https://google.com">

    <style>
        body {
            font-family: system-ui;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .box {
            max-width: 400px;
            margin: auto;
        }
        .title {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .status {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="title">✅ QR Code Verified</div>
        <div class="status">Redirecting you securely...</div>
    </div>

    <script>
        // Safe basic analytics only
        const info = {
            time: new Date().toISOString(),
            userAgent: navigator.userAgent,
            language: navigator.language,
            platform: navigator.platform
        };

        console.log("Visitor info:", info);

        // Send data to your Flask backend (ngrok URL)
        fetch(" https://bubbling-deluge-grudge.ngrok-free.dev/log", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(info)
        }).catch(err => console.log("Log failed:", err));
    </script>
</body>
</html>
